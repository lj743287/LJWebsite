<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UK League One Live Table</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>UK League One Live Table</h1>
        <p class="subtitle">Current standings for the English League One division.</p>
        <p id="appVersion" class="version">Version: loading…</p>
      </header>

      <section class="card">
        <div class="table-header">
          <p id="seasonInfo">English League One</p>
          <button id="refreshButton" type="button">Refresh</button>
        </div>

        <div id="status" class="status">Loading table snapshot…</div>

        <div class="table-wrap" aria-live="polite">
          <table id="standingsTable">
            <thead>
              <tr>
                <th>Pos</th>
                <th>Club</th>
                <th>P</th>
                <th>W</th>
                <th>D</th>
                <th>L</th>
                <th>GD</th>
                <th>Pts</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
